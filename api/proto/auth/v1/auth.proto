syntax = "proto3";

package auth.v1;

option go_package = "github.com/deniSSTK/task-engine/gen/proto/auth/v1;authv1";

import "google/api/annotations.proto";

import "common/v1/authz.proto";

import "auth/v1/requests.proto";
import "auth/v1/responses.proto";

// TODO: add uuid validation

service AuthService {
  rpc Register (RegisterRequest) returns (RegisterResponse) {
    option (common.v1.auth_policy) = AUTH_POLICY_PUBLIC;

    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }
  
  rpc Login (LoginRequest) returns (LoginResponse) {
    option (common.v1.auth_policy) = AUTH_POLICY_PUBLIC;

    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  rpc Refresh (RefreshRequest) returns (RefreshResponse) {
    option (common.v1.auth_policy) = AUTH_POLICY_PUBLIC;

    option (google.api.http) = {
      post: "/v1/auth/refresh"
      body: "*"
    };
  }

  rpc Me(MeRequest) returns (MeResponse) {
    option (common.v1.auth_policy) = AUTH_POLICY_AUTHENTICATED;

    option (google.api.http) = {
      get: "/v1/auth/me"
    };
  }

  rpc VerifyById(VerifyByIdRequest) returns (VerifyByIdResponse) {
    option (common.v1.auth_policy) = AUTH_POLICY_AUTHENTICATED;

    option (google.api.http) = {
      get: "/v1/auth/verify/{id}"
    };
  }

  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (common.v1.auth_policy) = AUTH_POLICY_AUTHENTICATED;

    option (google.api.http) = {
      patch: "/v1/auth/user",
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (common.v1.auth_policy) = AUTH_POLICY_AUTHENTICATED;

    option (google.api.http) = {
      delete: "/v1/auth/logout"
    };
  }
}