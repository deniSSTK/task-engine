syntax = "proto3";

package task.v1;

import "auth/v1/authz.proto";

option go_package = "github.com/deniSSTK/task-engine/gen/proto";

service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (CreateTaskResponse) {
    option (auth.v1.auth_policy) = AUTH_POLICY_AUTHENTICATED;
  };
}

message CreateTaskRequest {
  string name = 1;
}

message CreateTaskResponse {
  string id = 1;
  string name = 2;
}
