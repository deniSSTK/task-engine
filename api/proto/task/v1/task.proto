syntax = "proto3";

package task.v1;

option go_package = "github.com/deniSSTK/task-engine/gen/proto";

service TaskService {
  rpc CreateTask (CreateTaskRequest) returns (CreateTaskResponse);
}

message CreateTaskRequest {
  string name = 1;
}

message CreateTaskResponse {
  string id = 1;
  string name = 2;
}