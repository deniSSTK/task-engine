syntax = "proto3";

package auth.v1;

option go_package = "github.com/deniSSTK/task-engine/gen/proto/auth/v1;authv1";

import "protoc-gen-openapiv2/options/annotations.proto";

import "auth/v1/enums.proto";

message TokenDetails {
  string access_token = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"eyJhbGciOiJIUzI1NiIs...\"",
    }
  ];

  string refresh_token = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"eyJhbGciOiJIUzI1NiIs...\"",
    }
  ];

  int64 refresh_expires_at = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "1776759974",
    }
  ];
}

message AuthUser {
  string id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"32345854-f12d-4277-960f-eb3c82daa4da\""
    }
  ];

  UserRole role = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"USER\"",
    }
  ];
}

message User {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      required: ["id", "name", "full_name", "role", "status"]
    }
  };

  string id = 1 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"32345854-f12d-4277-960f-eb3c82daa4da\""
    }
  ];

  string name = 2 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Denis\""
    }
  ];

  optional string second_name = 3 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Tkachenko\""
    }
  ];

  string full_name = 4 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"Denis Tkachenko\""
    }
  ];

  string email = 5 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"denisdrawler@gmail.com\""
    }
  ];

  UserRole role = 6 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"User\""
    }
  ];

  UserStatus status = 7 [
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
      example: "\"ACTIVE\"",
    }
  ];
}