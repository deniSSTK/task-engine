version: v1
plugins:
  - name: go
    out: gen/proto
    opt: paths=source_relative
  - name: go-grpc
    out: gen/proto
    opt: paths=source_relative
  - name: grpc-gateway
    out: gen/proto
    opt: paths=source_relative
  - name: openapiv2
    out: gen/openapiv2
    opt:
      - logtostderr=true
      - allow_merge=true
      - merge_file_name=api