syntax = "proto3";

package auth;
option go_package = "github.com/deniSSTK/task-engine/gen/auth";

service AuthService {
  rpc Register (RegisterRequest) returns (TokensResponse);
  rpc Login (LoginRequest) returns (TokensResponse);
  rpc Refresh(RefreshRequest) returns (TokensResponse);
}

message TokensResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  optional string second_name = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}