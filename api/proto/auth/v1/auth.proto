syntax = "proto3";

package auth.v1;

import "google/api/annotations.proto";
import "buf/validate/validate.proto";

option go_package = "github.com/deniSSTK/task-engine/gen/proto";

service AuthService {
  rpc Register (RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/register"
      body: "*"
    };
  }

  rpc Login (LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/login"
      body: "*"
    };
  }

  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/v1/refresh"
      body: "*"
    };
  }
}

message RegisterRequest {
  string email = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.min_len = 5,
    (buf.validate.field).string.max_len = 200
  ];

  string password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 100
  ];

  string name = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 100
  ];

  optional string second_name = 4 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 100
  ];
}

message RegisterResponse {
  TokenDetails tokens = 1;
}

message LoginRequest {
  string email = 1 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).string.min_len = 5,
    (buf.validate.field).string.max_len = 200
  ];

  string password = 2 [
    (buf.validate.field).string.min_len = 8,
    (buf.validate.field).string.max_len = 100
  ];
}

message LoginResponse {
  TokenDetails tokens = 1;
}

message RefreshRequest {
  string refresh_token = 1 [
    (buf.validate.field).string.min_len = 1
  ];
}

message RefreshResponse {
  TokenDetails tokens = 1;
}

message TokenDetails {
  string access_token = 1;
  string refresh_token = 2;
  int64 refresh_expires_at = 3;
}